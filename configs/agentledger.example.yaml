# AgentLedger configuration
# See: https://github.com/WDZ-Dev/agent-ledger

listen: ":8787"

providers:
  openai:
    upstream: "https://api.openai.com"
    enabled: true
  anthropic:
    upstream: "https://api.anthropic.com"
    enabled: true

  # Additional providers — route via path prefix (e.g., /groq/v1/chat/completions)
  # extra:
  #   groq:
  #     type: "openai"                               # OpenAI-compatible API
  #     upstream: "https://api.groq.com/openai"
  #     path_prefix: "/groq"
  #     enabled: true
  #   mistral:
  #     type: "openai"
  #     upstream: "https://api.mistral.ai"
  #     path_prefix: "/mistral"
  #     enabled: true
  #   deepseek:
  #     type: "openai"
  #     upstream: "https://api.deepseek.com"
  #     path_prefix: "/deepseek"
  #     enabled: true
  #   gemini:
  #     type: "gemini"                               # Custom Gemini parser
  #     upstream: "https://generativelanguage.googleapis.com"
  #     path_prefix: "/gemini"
  #     enabled: true
  #   cohere:
  #     type: "cohere"                               # Custom Cohere parser
  #     upstream: "https://api.cohere.com"
  #     path_prefix: "/cohere"
  #     enabled: true
  #   azure:
  #     type: "azure"                                # Azure OpenAI (custom URL scheme)
  #     upstream: "https://my-resource.openai.azure.com"
  #     path_prefix: "/azure"
  #     enabled: true
  #   together:
  #     type: "openai"
  #     upstream: "https://api.together.xyz"
  #     path_prefix: "/together"
  #     enabled: true
  #   fireworks:
  #     type: "openai"
  #     upstream: "https://api.fireworks.ai/inference"
  #     path_prefix: "/fireworks"
  #     enabled: true
  #   perplexity:
  #     type: "openai"
  #     upstream: "https://api.perplexity.ai"
  #     path_prefix: "/perplexity"
  #     enabled: true
  #   openrouter:
  #     type: "openai"
  #     upstream: "https://openrouter.ai/api"
  #     path_prefix: "/openrouter"
  #     enabled: true
  #   xai:
  #     type: "openai"                               # xAI (Grok)
  #     upstream: "https://api.x.ai"
  #     path_prefix: "/xai"
  #     enabled: true
  #   cerebras:
  #     type: "openai"
  #     upstream: "https://api.cerebras.ai"
  #     path_prefix: "/cerebras"
  #     enabled: true
  #   sambanova:
  #     type: "openai"
  #     upstream: "https://api.sambanova.ai"
  #     path_prefix: "/sambanova"
  #     enabled: true

storage:
  driver: "sqlite"                  # "sqlite" or "postgres"
  dsn: "data/agentledger.db"        # SQLite path or Postgres connection string
  # max_open_conns: 25              # Postgres only
  # max_idle_conns: 5               # Postgres only
  # Example Postgres DSN:
  # dsn: "postgres://user:pass@localhost:5432/agentledger?sslmode=disable"

log:
  level: "info"    # debug, info, warn, error
  format: "text"   # text or json

recording:
  buffer_size: 10000   # async recording channel buffer
  workers: 4           # number of recording goroutines

# Budget enforcement (optional — omit to disable)
# budgets:
#   default:
#     daily_limit_usd: 50.0
#     monthly_limit_usd: 500.0
#     soft_limit_pct: 0.8    # warn at 80% of limit
#     action: "block"        # "block" returns 429, "warn" adds header only
#   rules:
#     - api_key_pattern: "sk-proj-dev-*"
#       daily_limit_usd: 5.0
#       monthly_limit_usd: 50.0
#       action: "block"
#     - tenant_id: "alpha"
#       daily_limit_usd: 100.0
#       monthly_limit_usd: 1000.0
#       action: "block"

# Circuit breaker (optional — omit to disable)
# circuit_breaker:
#   max_failures: 5       # consecutive 5xx before opening circuit
#   timeout_secs: 30      # seconds before trying again (half-open)

# Agent session tracking (optional — omit or set thresholds to 0 to disable)
# agent:
#   session_timeout_mins: 30    # auto-expire idle sessions
#   loop_threshold: 20          # same path N times in window = loop (0 = disabled)
#   loop_window_mins: 5         # sliding window for loop detection
#   loop_action: "warn"         # "warn" logs only, "block" returns 429
#   ghost_max_age_mins: 60      # sessions older than this are ghost candidates (0 = disabled)
#   ghost_min_calls: 50         # minimum calls before ghost alert
#   ghost_min_cost_usd: 1.0     # minimum spend before ghost alert

# Dashboard (enabled by default)
# dashboard:
#   enabled: true               # set to false to disable web UI and API

# Multi-tenancy (optional — omit to disable)
# tenants:
#   enabled: true
#   key_mappings:
#     - api_key_pattern: "sk-proj-team-alpha-*"
#       tenant_id: "alpha"
#     - api_key_pattern: "sk-proj-team-beta-*"
#       tenant_id: "beta"

# Alerting (optional — omit to disable)
# alerts:
#   slack:
#     webhook_url: "https://hooks.slack.com/services/T00/B00/xxx"
#   webhooks:
#     - url: "https://api.example.com/alerts"
#       headers:
#         Authorization: "Bearer token"
#   cooldown_mins: 5                       # deduplication window per alert

# Rate limiting (optional — omit to disable)
# rate_limits:
#   default:
#     requests_per_minute: 60
#     requests_per_hour: 1000
#   rules:
#     - api_key_pattern: "sk-proj-dev-*"
#       requests_per_minute: 10

# Admin API (optional — omit to disable)
# admin:
#   enabled: true
#   token: "your-secret-admin-token"       # Bearer token for auth

# MCP (Model Context Protocol) tool call metering (optional — omit to disable)
# mcp:
#   enabled: true                          # enable HTTP proxy for MCP servers
#   upstream: "http://localhost:3000"       # upstream MCP server URL
#   pricing:                               # per-call cost rules
#     - server: "filesystem"               # exact server+tool match
#       tool: "read_file"
#       cost_per_call: 0.01
#     - server: "filesystem"               # wildcard: all tools on server
#       tool: ""
#       cost_per_call: 0.005
#     - server: "github"
#       tool: ""
#       cost_per_call: 0.02
