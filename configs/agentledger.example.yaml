# AgentLedger configuration
# See: https://github.com/WDZ-Dev/agent-ledger

listen: ":8787"

providers:
  openai:
    upstream: "https://api.openai.com"
    enabled: true
  anthropic:
    upstream: "https://api.anthropic.com"
    enabled: true

storage:
  driver: "sqlite"
  dsn: "data/agentledger.db"

log:
  level: "info"    # debug, info, warn, error
  format: "text"   # text or json

recording:
  buffer_size: 10000   # async recording channel buffer
  workers: 4           # number of recording goroutines

# Budget enforcement (optional — omit to disable)
# budgets:
#   default:
#     daily_limit_usd: 50.0
#     monthly_limit_usd: 500.0
#     soft_limit_pct: 0.8    # warn at 80% of limit
#     action: "block"        # "block" returns 429, "warn" adds header only
#   rules:
#     - api_key_pattern: "sk-proj-dev-*"
#       daily_limit_usd: 5.0
#       monthly_limit_usd: 50.0
#       action: "block"

# Circuit breaker (optional — omit to disable)
# circuit_breaker:
#   max_failures: 5       # consecutive 5xx before opening circuit
#   timeout_secs: 30      # seconds before trying again (half-open)

# Agent session tracking (optional — omit or set thresholds to 0 to disable)
# agent:
#   session_timeout_mins: 30    # auto-expire idle sessions
#   loop_threshold: 20          # same path N times in window = loop (0 = disabled)
#   loop_window_mins: 5         # sliding window for loop detection
#   loop_action: "warn"         # "warn" logs only, "block" returns 429
#   ghost_max_age_mins: 60      # sessions older than this are ghost candidates (0 = disabled)
#   ghost_min_calls: 50         # minimum calls before ghost alert
#   ghost_min_cost_usd: 1.0     # minimum spend before ghost alert

# Dashboard (enabled by default)
# dashboard:
#   enabled: true               # set to false to disable web UI and API
