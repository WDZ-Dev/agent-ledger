version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Bugs & correctness
    - govet          # reports suspicious constructs
    - errcheck       # checks unchecked errors
    - staticcheck    # advanced static analysis
    - ineffassign    # detects unused assignments
    - unused         # checks for unused code

    # Security
    - gosec          # security-focused linter

    # Style & consistency
    - misspell       # catches spelling mistakes in comments
    - revive         # extensible linter (replaces golint)
    - goconst        # finds repeated strings that could be constants
    - unconvert      # removes unnecessary type conversions

    # Performance
    - prealloc       # finds slice declarations that could be preallocated
    - bodyclose      # checks HTTP response body is closed

    # Error handling
    - nilerr         # finds code that returns nil even if it checks err != nil
    - errname        # checks error var naming (ErrFoo)

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code

    gosec:
      excludes:
        - G104 # unhandled errors — errcheck covers this better
        - G304 # file inclusion — we need this for config loading

    govet:
      enable-all: true
      disable:
        - fieldalignment # too noisy for early development

issues:
  exclude-rules:
    # Test files can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - goconst

  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/WDZ-Dev/agent-ledger
