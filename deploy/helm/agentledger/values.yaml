# Default values for agentledger

replicaCount: 1  # SQLite supports single writer only; use Postgres for multiple replicas

image:
  repository: ghcr.io/wdz-dev/agent-ledger
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentledger.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

config:
  listen: ":8787"
  providers:
    openai:
      upstream: "https://api.openai.com"
      enabled: true
    anthropic:
      upstream: "https://api.anthropic.com"
      enabled: true
  storage:
    driver: "sqlite"                     # "sqlite" or "postgres"
    dsn: "/data/agentledger.db"          # file path for sqlite, DSN for postgres
    # max_open_conns: 25                 # postgres only
    # max_idle_conns: 5                  # postgres only
  log:
    level: "info"
    format: "json"
  recording:
    buffer_size: 10000
    workers: 4

# External Postgres — uncomment to use instead of SQLite
# postgres:
#   enabled: false
#   host: "postgres.default.svc.cluster.local"
#   port: 5432
#   database: "agentledger"
#   username: "agentledger"
#   password: ""
#   sslmode: "disable"

nodeSelector: {}
tolerations: []
affinity: {}
