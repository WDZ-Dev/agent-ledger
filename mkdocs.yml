site_name: AgentLedger
site_url: https://wdz-dev.github.io/agent-ledger/
site_description: "Know what your agents cost. Real-time cost attribution, budget enforcement, and financial observability for AI agents."

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: teal
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - toc.follow
  custom_dir: docs/overrides

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/waitlist.js

extra:
  generator: false

copyright: ""

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - minify:
      minify_html: true

nav:
  - Home: index.md
