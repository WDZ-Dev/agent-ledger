site_name: AgentLedger
site_url: https://wdz-dev.github.io/agent-ledger/docs/
site_description: "Know what your agents cost. Real-time cost attribution, budget enforcement, and financial observability for AI agents."

theme:
  name: material
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: custom
      accent: teal
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
  custom_dir: docs/overrides

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

copyright: "&copy; 2025-2026 WDZ-Dev &middot; Source Available License"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Configuration:
    - Overview: configuration/index.md
    - Reference: configuration/reference.md
  - Features:
    - Providers: features/providers.md
    - Budget Enforcement: features/budgets.md
    - Agent Session Tracking: features/agent-tracking.md
    - Dashboard: features/dashboard.md
    - Alerting: features/alerting.md
    - Multi-Tenancy: features/multi-tenancy.md
    - Rate Limiting: features/rate-limiting.md
    - MCP Tool Metering: features/mcp.md
    - Circuit Breaker: features/circuit-breaker.md
    - Observability: features/observability.md
  - Deployment:
    - Docker: deployment/docker.md
    - Kubernetes: deployment/kubernetes.md
  - Guides:
    - OpenClaw Integration: guides/openclaw.md
  - Admin API: admin-api.md
  - Roadmap: roadmap.md
